services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: inventario-ventas-app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: inventario-ventas-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventario_ventas
      MYSQL_USER: inventario_user
      MYSQL_PASSWORD: inventario_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  composer:
    image: composer:2
    container_name: inventario-ventas-composer
    working_dir: /app
    volumes:
      - ./:/app
    profiles:
      - tools

volumes:
  mysql_data: